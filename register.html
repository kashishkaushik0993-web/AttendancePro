<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AttendancePro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="script.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8">
    <h1 class="text-3xl font-bold text-center mb-8 text-indigo-700">Create New Account</h1>
    
    <form id="registerForm">
      <div class="space-y-6">
        <input type="text" id="name" placeholder="Full Name" class="w-full px-5 py-4 border border-gray-300 rounded-2xl" required>
        <input type="text" id="rollNo" placeholder="Roll Number / ID" class="w-full px-5 py-4 border border-gray-300 rounded-2xl" required>
        <input type="password" id="password" placeholder="Password" class="w-full px-5 py-4 border border-gray-300 rounded-2xl" required>
        <button type="submit" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xl rounded-3xl">Register</button>
      </div>
    </form>
    
    <p class="text-center mt-6 text-sm text-gray-500">
      Already have an account? <a href="login.html" class="text-indigo-600">Login</a>
    </p>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const rollNo = document.getElementById('rollNo').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        await fetch('http://localhost:5000/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, rollNo, password })
        });
        alert('Registration successful! Please login.');
        window.location.href = 'login.html';
      } catch (err) {
        alert('Registration failed. Try again.');
      }
    });
  </script>
</body>
</html>
